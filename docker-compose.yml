# =============================================================================
# Yunt Mail Server - Docker Compose Configuration
# =============================================================================
#
# Usage:
#   docker compose up -d                                          # SQLite (default)
#   docker compose -f docker-compose.yml -f docker-compose.mysql.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.postgres.yml up -d
#   docker compose -f docker-compose.yml -f docker-compose.mongodb.yml up -d
#
# =============================================================================

services:
  yunt:
    image: yunt:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yunt-mail-server
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "1143:1143"
      - "8025:8025"
    volumes:
      - ./configs/yunt.example.yaml:/etc/yunt/yunt.yaml:ro
      - ./docker-data/sqlite:/var/lib/yunt
    environment:
      YUNT_DATABASE_DSN: /var/lib/yunt/yunt.db
      YUNT_LOGGING_OUTPUT: stdout
      YUNT_LOGGING_FORMAT: json
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8025/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

networks:
  default:
    name: yunt-network
