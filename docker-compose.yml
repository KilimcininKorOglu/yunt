# =============================================================================
# Yunt Mail Server - Docker Compose Configuration
# =============================================================================
# This configuration provides a complete development mail server setup with
# health checks and container orchestration.
#
# Usage:
#   docker-compose up -d                      # Start Yunt with SQLite (default)
#   docker-compose down                       # Stop all services
#   docker-compose logs -f yunt               # View Yunt logs
#   docker-compose ps                         # Check container health status
#
# PostgreSQL Profile:
#   docker-compose --profile postgres up -d   # Start Yunt with PostgreSQL
#   docker-compose --profile postgres down    # Stop all services
#   docker-compose --profile postgres down -v # Stop and remove volumes
#
# Environment Configuration:
#   The PostgreSQL configuration is stored in configs/docker/postgres.env
#   You can override values by creating a .env file in the project root.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Yunt Mail Server (SQLite - Default)
  # ---------------------------------------------------------------------------
  # This is the default Yunt configuration using SQLite for storage.
  # Use this for quick setup and lightweight deployments.
  yunt:
    image: yunt:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yunt-mail-server
    restart: unless-stopped
    profiles:
      - default
      - ""
    ports:
      # SMTP server
      - "1025:1025"
      # IMAP server
      - "1143:1143"
      # Web UI / API
      - "8025:8025"
    volumes:
      # Persistent data storage
      - yunt_data:/var/lib/yunt
      # Configuration (optional, mount local config if needed)
      # - ./configs/yunt.yaml:/etc/yunt/yunt.yaml:ro
    environment:
      # Database configuration (SQLite)
      YUNT_DATABASE_DRIVER: sqlite
      YUNT_DATABASE_DSN: /var/lib/yunt/yunt.db
      # Logging configuration
      YUNT_LOGGING_OUTPUT: stdout
      YUNT_LOGGING_FORMAT: json
      YUNT_LOGGING_LEVEL: info
      # SMTP configuration
      YUNT_SMTP_ENABLED: "true"
      YUNT_SMTP_HOST: "0.0.0.0"
      YUNT_SMTP_PORT: "1025"
      # IMAP configuration
      YUNT_IMAP_ENABLED: "true"
      YUNT_IMAP_HOST: "0.0.0.0"
      YUNT_IMAP_PORT: "1143"
      # API configuration
      YUNT_API_ENABLED: "true"
      YUNT_API_HOST: "0.0.0.0"
      YUNT_API_PORT: "8025"
    healthcheck:
      # Comprehensive health check that verifies all services
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8025/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Resource limits (optional, adjust based on expected load)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # PostgreSQL Database
  # ---------------------------------------------------------------------------
  # PostgreSQL database for production-like deployments.
  # Activated with: docker-compose --profile postgres up -d
  postgres:
    image: postgres:16-alpine
    container_name: yunt-postgres
    restart: unless-stopped
    profiles:
      - postgres
    env_file:
      - ./configs/docker/postgres.env
    environment:
      # PostgreSQL container configuration
      # These can be overridden in configs/docker/postgres.env or .env
      POSTGRES_USER: ${POSTGRES_USER:-yunt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yunt_password}
      POSTGRES_DB: ${POSTGRES_DB:-yunt}
      # Optimize for development (faster startup, less durability)
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C"
    volumes:
      # Persistent data storage
      - postgres_data:/var/lib/postgresql/data
      # Mount initialization scripts (executed on first container start)
      # - ./scripts/postgres-init:/docker-entrypoint-initdb.d:ro
    ports:
      # Expose PostgreSQL port for external connections (optional)
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-yunt} -d ${POSTGRES_DB:-yunt}"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # ---------------------------------------------------------------------------
  # Yunt Mail Server (PostgreSQL)
  # ---------------------------------------------------------------------------
  # Yunt configured to use PostgreSQL as the database backend.
  # Activated with: docker-compose --profile postgres up -d
  yunt-postgres:
    image: yunt:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yunt-mail-server-postgres
    restart: unless-stopped
    profiles:
      - postgres
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # SMTP server
      - "1025:1025"
      # IMAP server
      - "1143:1143"
      # Web UI / API
      - "8025:8025"
    volumes:
      # Persistent data storage (for attachments and cache)
      - yunt_data:/var/lib/yunt
      # Configuration (optional, mount local config if needed)
      # - ./configs/yunt.postgres.yaml:/etc/yunt/yunt.yaml:ro
    env_file:
      - ./configs/docker/postgres.env
    environment:
      # Database configuration (PostgreSQL)
      YUNT_DATABASE_DRIVER: postgres
      YUNT_DATABASE_HOST: postgres
      YUNT_DATABASE_PORT: "5432"
      YUNT_DATABASE_NAME: ${POSTGRES_DB:-yunt}
      YUNT_DATABASE_USERNAME: ${POSTGRES_USER:-yunt}
      YUNT_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-yunt_password}
      YUNT_DATABASE_SSLMODE: disable
      YUNT_DATABASE_AUTOMIGRATE: "true"
      # Connection pool settings
      YUNT_DATABASE_MAXOPENCONNS: "25"
      YUNT_DATABASE_MAXIDLECONNS: "10"
      YUNT_DATABASE_CONNMAXLIFETIME: "30m"
      YUNT_DATABASE_CONNMAXIDLETIME: "5m"
      # Logging configuration
      YUNT_LOGGING_OUTPUT: stdout
      YUNT_LOGGING_FORMAT: json
      YUNT_LOGGING_LEVEL: info
      # SMTP configuration
      YUNT_SMTP_ENABLED: "true"
      YUNT_SMTP_HOST: "0.0.0.0"
      YUNT_SMTP_PORT: "1025"
      # IMAP configuration
      YUNT_IMAP_ENABLED: "true"
      YUNT_IMAP_HOST: "0.0.0.0"
      YUNT_IMAP_PORT: "1143"
      # API configuration
      YUNT_API_ENABLED: "true"
      YUNT_API_HOST: "0.0.0.0"
      YUNT_API_PORT: "8025"
    healthcheck:
      # Comprehensive health check that verifies all services
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8025/ready"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    # Resource limits (optional, adjust based on expected load)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  yunt_data:
    name: yunt-data
  postgres_data:
    name: yunt-postgres-data

networks:
  default:
    name: yunt-network
