# =============================================================================
# Yunt Mail Server - Docker Compose Configuration
# =============================================================================
# This configuration provides a complete development mail server setup with
# health checks and container orchestration.
#
# Usage:
#   docker-compose up -d                     # Start with SQLite (default)
#   docker-compose --profile mongodb up -d   # Start with MongoDB
#   docker-compose down                      # Stop all services
#   docker-compose logs -f yunt              # View Yunt logs
#   docker-compose ps                        # Check container health status
#
# Profiles:
#   - mongodb: Use MongoDB as the database backend
#
# Environment Files:
#   - configs/docker/mongodb.env: MongoDB configuration
# =============================================================================

services:
  # Yunt Mail Server
  yunt:
    image: yunt:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yunt-mail-server
    restart: unless-stopped
    ports:
      # SMTP server
      - "1025:1025"
      # IMAP server
      - "1143:1143"
      # Web UI / API
      - "8025:8025"
    volumes:
      # Persistent data storage
      - yunt_data:/var/lib/yunt
      # Configuration (optional, mount local config if needed)
      # - ./configs/yunt.yaml:/etc/yunt/yunt.yaml:ro
    environment:
      # Database configuration
      YUNT_DATABASE_DSN: /var/lib/yunt/yunt.db
      # Logging configuration
      YUNT_LOGGING_OUTPUT: stdout
      YUNT_LOGGING_FORMAT: json
      YUNT_LOGGING_LEVEL: info
      # SMTP configuration
      YUNT_SMTP_ENABLED: "true"
      YUNT_SMTP_HOST: "0.0.0.0"
      YUNT_SMTP_PORT: "1025"
      # IMAP configuration
      YUNT_IMAP_ENABLED: "true"
      YUNT_IMAP_HOST: "0.0.0.0"
      YUNT_IMAP_PORT: "1143"
      # API configuration
      YUNT_API_ENABLED: "true"
      YUNT_API_HOST: "0.0.0.0"
      YUNT_API_PORT: "8025"
    healthcheck:
      # Comprehensive health check that verifies all services
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8025/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Resource limits (optional, adjust based on expected load)
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  # PostgreSQL Database (optional - uncomment to use PostgreSQL instead of SQLite)
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: yunt-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: yunt
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-yunt_password}
  #     POSTGRES_DB: yunt
  #   volumes:
  #     - postgres_data:/var/lib/postgresql/data
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U yunt -d yunt"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5
  #   # When using PostgreSQL, update yunt environment:
  #   # YUNT_DATABASE_DRIVER: postgres
  #   # YUNT_DATABASE_HOST: postgres
  #   # YUNT_DATABASE_PORT: "5432"
  #   # YUNT_DATABASE_USER: yunt
  #   # YUNT_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-yunt_password}
  #   # YUNT_DATABASE_NAME: yunt

  # ---------------------------------------------------------------------------
  # MongoDB Database (use with --profile mongodb)
  # ---------------------------------------------------------------------------
  # Start with: docker-compose --profile mongodb up -d
  mongodb:
    image: mongo:7.0
    container_name: yunt-mongodb
    profiles:
      - mongodb
    restart: unless-stopped
    env_file:
      - configs/docker/mongodb.env
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./scripts/mongodb-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Yunt configured for MongoDB (use with --profile mongodb)
  yunt-mongodb:
    image: yunt:latest
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yunt-mail-server-mongodb
    profiles:
      - mongodb
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "1025:1025"
      - "1143:1143"
      - "8025:8025"
    volumes:
      - yunt_data_mongodb:/var/lib/yunt
    env_file:
      - configs/docker/mongodb.env
    environment:
      # Logging configuration
      YUNT_LOGGING_OUTPUT: stdout
      YUNT_LOGGING_FORMAT: json
      YUNT_LOGGING_LEVEL: info
      # SMTP configuration
      YUNT_SMTP_ENABLED: "true"
      YUNT_SMTP_HOST: "0.0.0.0"
      YUNT_SMTP_PORT: "1025"
      # IMAP configuration
      YUNT_IMAP_ENABLED: "true"
      YUNT_IMAP_HOST: "0.0.0.0"
      YUNT_IMAP_PORT: "1143"
      # API configuration
      YUNT_API_ENABLED: "true"
      YUNT_API_HOST: "0.0.0.0"
      YUNT_API_PORT: "8025"
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8025/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

volumes:
  yunt_data:
    name: yunt-data
  mongodb_data:
    name: yunt-mongodb-data
  yunt_data_mongodb:
    name: yunt-data-mongodb
  # postgres_data:
  #   name: yunt-postgres-data

networks:
  default:
    name: yunt-network
