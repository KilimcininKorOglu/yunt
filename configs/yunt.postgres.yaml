# Yunt Mail Server - PostgreSQL Configuration
#
# This configuration file demonstrates PostgreSQL database setup.
# Copy this file to yunt.yaml and modify according to your needs.
#
# Docker Compose example for PostgreSQL:
#
#   version: '3.8'
#   services:
#     postgres:
#       image: postgres:16-alpine
#       environment:
#         POSTGRES_USER: yunt
#         POSTGRES_PASSWORD: yunt_secret
#         POSTGRES_DB: yunt
#       ports:
#         - "5432:5432"
#       volumes:
#         - postgres_data:/var/lib/postgresql/data
#       healthcheck:
#         test: ["CMD-SHELL", "pg_isready -U yunt"]
#         interval: 10s
#         timeout: 5s
#         retries: 5
#
#     yunt:
#       image: yunt:latest
#       depends_on:
#         postgres:
#           condition: service_healthy
#       environment:
#         YUNT_DATABASE_DRIVER: postgres
#         YUNT_DATABASE_HOST: postgres
#         YUNT_DATABASE_PORT: 5432
#         YUNT_DATABASE_NAME: yunt
#         YUNT_DATABASE_USERNAME: yunt
#         YUNT_DATABASE_PASSWORD: yunt_secret
#       ports:
#         - "1025:1025"
#         - "1143:1143"
#         - "8025:8025"
#
#   volumes:
#     postgres_data:

# Server Settings
server:
  name: mail.example.com
  domain: example.com
  gracefulTimeout: 30s

# SMTP Server Configuration
smtp:
  enabled: true
  host: 0.0.0.0
  port: 1025
  tls:
    enabled: false
    startTLS: true
  maxMessageSize: 10485760
  maxRecipients: 100
  readTimeout: 60s
  writeTimeout: 60s
  authRequired: false
  allowRelay: false

# IMAP Server Configuration
imap:
  enabled: true
  host: 0.0.0.0
  port: 1143
  tls:
    enabled: false
    startTLS: true
  readTimeout: 60s
  writeTimeout: 60s
  idleTimeout: 30m

# REST API and Web UI Configuration
api:
  enabled: true
  host: 0.0.0.0
  port: 8025
  tls:
    enabled: false
  readTimeout: 30s
  writeTimeout: 30s
  corsAllowedOrigins:
    - "*"
  rateLimit: 100
  enableSwagger: true

# Database Configuration - PostgreSQL
database:
  # Use PostgreSQL driver
  driver: postgres
  
  # Option 1: Use DSN string (takes precedence over individual settings)
  # dsn: "host=localhost port=5432 user=yunt password=yunt_secret dbname=yunt sslmode=disable"
  
  # Option 2: Use individual connection settings
  host: localhost
  port: 5432
  name: yunt
  username: yunt
  password: yunt_secret
  
  # SSL mode for PostgreSQL connections
  # Options: disable, require, verify-ca, verify-full
  # - disable: No SSL/TLS encryption
  # - require: SSL/TLS required but no certificate verification
  # - verify-ca: SSL/TLS required with CA certificate verification
  # - verify-full: SSL/TLS required with full certificate verification
  sslMode: disable
  
  # Connection pool settings
  # PostgreSQL can handle many concurrent connections
  maxOpenConns: 25
  maxIdleConns: 10
  connMaxLifetime: 30m
  connMaxIdleTime: 5m
  
  # Automatically run database migrations on startup
  autoMigrate: true

# Authentication Settings
auth:
  jwtSecret: "change-this-in-production"
  jwtExpiration: 24h
  refreshExpiration: 168h
  bcryptCost: 10
  sessionTimeout: 24h
  maxLoginAttempts: 5
  lockoutDuration: 15m

# Logging Configuration
logging:
  level: info
  format: text
  output: stdout
  includeCaller: false

# Default Admin User Settings
admin:
  username: admin
  password: "change-this-in-production"
  email: admin@example.com
  createOnStartup: true

# Mail Storage Settings
storage:
  type: database
  maxMailboxSize: 0
  retentionDays: 0
