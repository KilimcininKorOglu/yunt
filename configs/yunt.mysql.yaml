# Yunt Mail Server - MySQL Configuration
#
# This configuration file demonstrates MySQL database setup.
# Copy this file to yunt.yaml and modify according to your needs.
#
# Docker Compose example for MySQL:
#
#   version: '3.8'
#   services:
#     mysql:
#       image: mysql:8.0
#       environment:
#         MYSQL_ROOT_PASSWORD: root_secret
#         MYSQL_DATABASE: yunt
#         MYSQL_USER: yunt
#         MYSQL_PASSWORD: yunt_secret
#       ports:
#         - "3306:3306"
#       volumes:
#         - mysql_data:/var/lib/mysql
#       command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
#       healthcheck:
#         test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p$$MYSQL_ROOT_PASSWORD"]
#         interval: 10s
#         timeout: 5s
#         retries: 5
#
#     yunt:
#       image: yunt:latest
#       depends_on:
#         mysql:
#           condition: service_healthy
#       environment:
#         YUNT_DATABASE_DRIVER: mysql
#         YUNT_DATABASE_HOST: mysql
#         YUNT_DATABASE_PORT: 3306
