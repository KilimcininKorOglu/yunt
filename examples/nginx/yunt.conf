# =============================================================================
# Yunt Mail Server - Nginx Reverse Proxy Configuration
# =============================================================================
#
# This configuration provides:
# - HTTPS termination with automatic Let's Encrypt certificates
# - HTTP to HTTPS redirect
# - WebSocket support for real-time updates
# - Security headers and rate limiting
# - Optimized proxy settings
#
# Installation:
#   1. Copy this file to /etc/nginx/sites-available/yunt.conf
#   2. Update server_name with your domain
#   3. Obtain TLS certificates (see below)
#   4. Enable: ln -s /etc/nginx/sites-available/yunt.conf /etc/nginx/sites-enabled/
#   5. Test: nginx -t
#   6. Reload: systemctl reload nginx
#
# Obtaining Let's Encrypt Certificates:
#   # Stop nginx temporarily
#   systemctl stop nginx
#   
#   # Obtain certificate
#   certbot certonly --standalone -d mail.example.com
#   
#   # Start nginx
#   systemctl start nginx
#
# =============================================================================

# Rate limiting zones
# - General requests: 10 requests/second with burst of 20
# - API requests: 20 requests/second with burst of 50
limit_req_zone $binary_remote_addr zone=yunt_general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=yunt_api:10m rate=20r/s;

# Connection limiting
limit_conn_zone $binary_remote_addr zone=yunt_conn:10m;

# Upstream server definition
# For multiple instances, add more servers and use load balancing
upstream yunt_backend {
    # Yunt server (adjust host/port as needed)
    server 127.0.0.1:8025;
    
    # For Docker deployment:
    # server yunt:8025;
    
    # For multiple instances (requires PostgreSQL/MySQL):
    # server yunt1:8025 weight=5;
    # server yunt2:8025 weight=5;
    # server yunt3:8025 backup;
    
    # Keep connections alive for better performance
    keepalive 32;
}

# =============================================================================
# HTTP Server - Redirect to HTTPS
# =============================================================================
server {
    listen 80;
    listen [::]:80;
    
    # UPDATE: Replace with your domain
    server_name mail.example.com;

    # Allow Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        try_files $uri =404;
    }

    # Redirect all other requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# =============================================================================
# HTTPS Server - Main Configuration
# =============================================================================
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    
    # UPDATE: Replace with your domain
    server_name mail.example.com;

    # -------------------------------------------------------------------------
    # TLS Configuration
    # -------------------------------------------------------------------------
    
    # UPDATE: Replace with your certificate paths
    ssl_certificate /etc/letsencrypt/live/mail.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mail.example.com/privkey.pem;
    
    # Modern TLS configuration (TLS 1.2 and 1.3 only)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    
    # SSL session configuration
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:50m;
    ssl_session_tickets off;
    
    # OCSP Stapling for faster TLS handshakes
    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/mail.example.com/chain.pem;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout 5s;

    # -------------------------------------------------------------------------
    # Security Headers
    # -------------------------------------------------------------------------
    
    # Prevent clickjacking
    add_header X-Frame-Options "SAMEORIGIN" always;
    
    # Prevent MIME type sniffing
    add_header X-Content-Type-Options "nosniff" always;
    
    # Enable XSS protection
    add_header X-XSS-Protection "1; mode=block" always;
    
    # Control referrer information
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    
    # Enable HSTS (HTTP Strict Transport Security)
    # WARNING: Only enable after confirming HTTPS works correctly
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    
    # Content Security Policy (adjust as needed for your deployment)
    # add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:;" always;

    # -------------------------------------------------------------------------
    # Logging
    # -------------------------------------------------------------------------
    
    access_log /var/log/nginx/yunt_access.log combined;
    error_log /var/log/nginx/yunt_error.log warn;

    # -------------------------------------------------------------------------
    # Client Settings
    # -------------------------------------------------------------------------
    
    # Maximum upload size (for email attachments)
    client_max_body_size 50M;
    
    # Timeouts
    client_body_timeout 60s;
    client_header_timeout 60s;
    send_timeout 60s;
    
    # Connection limits
    limit_conn yunt_conn 20;

    # -------------------------------------------------------------------------
    # Proxy Settings (applied to all locations)
    # -------------------------------------------------------------------------
    
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    
    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
    
    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 8 16k;
    proxy_busy_buffers_size 24k;

    # -------------------------------------------------------------------------
    # Static Assets (if served separately)
    # -------------------------------------------------------------------------
    
    # Uncomment if serving static files directly from nginx
    # location /static/ {
    #     alias /var/www/yunt/static/;
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }

    # -------------------------------------------------------------------------
    # Health Check Endpoints (no rate limiting)
    # -------------------------------------------------------------------------
    
    location = /health {
        proxy_pass http://yunt_backend;
        access_log off;
        proxy_read_timeout 5s;
    }

    location = /ready {
        proxy_pass http://yunt_backend;
        access_log off;
        proxy_read_timeout 5s;
    }

    # -------------------------------------------------------------------------
    # WebSocket Support (for real-time features)
    # -------------------------------------------------------------------------
    
    location /ws {
        proxy_pass http://yunt_backend;
        
        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Long timeout for WebSocket connections
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # Disable buffering for WebSocket
        proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # API Endpoints
    # -------------------------------------------------------------------------
    
    location /api/ {
        # Higher rate limit for API
        limit_req zone=yunt_api burst=50 nodelay;
        
        proxy_pass http://yunt_backend;
        
        # Don't buffer API responses
        proxy_buffering off;
    }

    # -------------------------------------------------------------------------
    # Swagger/API Documentation (optional)
    # -------------------------------------------------------------------------
    
    location /api/docs {
        proxy_pass http://yunt_backend;
        
        # No rate limiting for documentation
        limit_req off;
    }

    # -------------------------------------------------------------------------
    # Main Application
    # -------------------------------------------------------------------------
    
    location / {
        # Rate limiting
        limit_req zone=yunt_general burst=20 nodelay;
        
        proxy_pass http://yunt_backend;
    }
}

