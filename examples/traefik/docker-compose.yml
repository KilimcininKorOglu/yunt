# =============================================================================
# Yunt Mail Server - Traefik Reverse Proxy Configuration
# =============================================================================
#
# This Docker Compose configuration provides:
# - Traefik v3 reverse proxy with automatic Let's Encrypt certificates
# - HTTPS termination and HTTP to HTTPS redirect
# - Rate limiting and security headers
# - Health checks and dashboard
#
# Prerequisites:
# - Docker and Docker Compose installed
# - Domain DNS pointing to your server
# - Ports 80 and 443 available
#
# Usage:
#   1. Copy this file to your deployment directory
#   2. Create .env file with required variables (see below)
#   3. Update domain names in labels
#   4. Run: docker-compose up -d
#
# Environment Variables (.env file):
#   # Required
#   DOMAIN=mail.example.com
#   ACME_EMAIL=admin@example.com
#   JWT_SECRET=your-jwt-secret-min-32-chars
#   ADMIN_PASSWORD=your-admin-password
#   
#   # Optional - Database (PostgreSQL example)
#   POSTGRES_PASSWORD=your-db-password
#   
#   # Optional - Traefik Dashboard
#   TRAEFIK_DASHBOARD_USER=admin
#   TRAEFIK_DASHBOARD_PASSWORD_HASH=$apr1$...  # htpasswd -nb admin password
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Traefik Reverse Proxy
  # ---------------------------------------------------------------------------
  traefik:
    image: traefik:v3.0
    container_name: traefik
    restart: unless-stopped
    command:
      # API and Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"
      
      # Docker provider
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=yunt-proxy"
      
      # Entrypoints
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
      
      # HTTP to HTTPS redirect
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      
      # Let's Encrypt configuration
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:-admin@example.com}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
      
      # Logging
      - "--log.level=INFO"
      - "--accesslog=true"
      - "--accesslog.format=json"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik-letsencrypt:/letsencrypt
    networks:
      - yunt-proxy
    labels:
      # Enable Traefik for this container
      - "traefik.enable=true"
      
      # Dashboard router (optional - for admin access)
      - "traefik.http.routers.traefik-dashboard.rule=Host(`traefik.${DOMAIN:-example.com}`)"
      - "traefik.http.routers.traefik-dashboard.entrypoints=websecure"
      - "traefik.http.routers.traefik-dashboard.tls.certresolver=letsencrypt"
      - "traefik.http.routers.traefik-dashboard.service=api@internal"
      - "traefik.http.routers.traefik-dashboard.middlewares=traefik-auth"
      
      # Dashboard authentication (htpasswd format)
      # Generate: htpasswd -nb admin yourpassword | sed -e 's/\$/\$\$/g'
      - "traefik.http.middlewares.traefik-auth.basicauth.users=${TRAEFIK_DASHBOARD_USER:-admin}:${TRAEFIK_DASHBOARD_PASSWORD_HASH:-$$apr1$$H6uskkkW$$IgXLP6ewTrSuBkTrqE8wj/}"

  # ---------------------------------------------------------------------------
  # Yunt Mail Server
  # ---------------------------------------------------------------------------
  yunt:
    image: ghcr.io/yunt/yunt:latest
    container_name: yunt
    restart: unless-stopped
    expose:
      - "8025"
    volumes:
      - yunt-data:/var/lib/yunt
    environment:
      # Server configuration
      YUNT_SERVER_NAME: "${DOMAIN:-mail.example.com}"
      YUNT_SERVER_DOMAIN: "${DOMAIN:-example.com}"
      
      # Database (SQLite by default, see PostgreSQL section below)
      YUNT_DATABASE_DRIVER: sqlite
      YUNT_DATABASE_DSN: /var/lib/yunt/yunt.db
      
      # Authentication
      YUNT_AUTH_JWTSECRET: "${JWT_SECRET}"
      YUNT_AUTH_JWTEXPIRATION: "1h"
      
      # Admin user
      YUNT_ADMIN_USERNAME: admin
      YUNT_ADMIN_PASSWORD: "${ADMIN_PASSWORD}"
      YUNT_ADMIN_EMAIL: "admin@${DOMAIN:-example.com}"
      
      # Services
      YUNT_SMTP_ENABLED: "true"
      YUNT_SMTP_HOST: "0.0.0.0"
      YUNT_SMTP_PORT: "1025"
      YUNT_IMAP_ENABLED: "true"
      YUNT_IMAP_HOST: "0.0.0.0"
      YUNT_IMAP_PORT: "1143"
      YUNT_API_ENABLED: "true"
      YUNT_API_HOST: "0.0.0.0"
      YUNT_API_PORT: "8025"
      
      # Logging
      YUNT_LOGGING_LEVEL: info
      YUNT_LOGGING_FORMAT: json
      YUNT_LOGGING_OUTPUT: stdout
    networks:
      - yunt-proxy
      - yunt-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8025/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    labels:
      # Enable Traefik for Yunt
      - "traefik.enable=true"
      
      # Web UI / API Router
      - "traefik.http.routers.yunt.rule=Host(`${DOMAIN:-mail.example.com}`)"
      - "traefik.http.routers.yunt.entrypoints=websecure"
      - "traefik.http.routers.yunt.tls.certresolver=letsencrypt"
      - "traefik.http.routers.yunt.service=yunt"
      - "traefik.http.routers.yunt.middlewares=yunt-security,yunt-ratelimit"
      
      # Service
      - "traefik.http.services.yunt.loadbalancer.server.port=8025"
      - "traefik.http.services.yunt.loadbalancer.healthcheck.path=/health"
      - "traefik.http.services.yunt.loadbalancer.healthcheck.interval=10s"
      
      # Security Headers Middleware
      - "traefik.http.middlewares.yunt-security.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.yunt-security.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.yunt-security.headers.stsPreload=true"
      - "traefik.http.middlewares.yunt-security.headers.frameDeny=true"
      - "traefik.http.middlewares.yunt-security.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.yunt-security.headers.browserXssFilter=true"
      - "traefik.http.middlewares.yunt-security.headers.referrerPolicy=strict-origin-when-cross-origin"
      
      # Rate Limiting Middleware
      - "traefik.http.middlewares.yunt-ratelimit.ratelimit.average=100"
      - "traefik.http.middlewares.yunt-ratelimit.ratelimit.burst=50"
      - "traefik.http.middlewares.yunt-ratelimit.ratelimit.period=1m"

  # ---------------------------------------------------------------------------
  # PostgreSQL Database (Optional - uncomment for production)
  # ---------------------------------------------------------------------------
  # postgres:
  #   image: postgres:16-alpine
  #   container_name: yunt-postgres
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_USER: yunt
  #     POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  #     POSTGRES_DB: yunt
  #   volumes:
  #     - postgres-data:/var/lib/postgresql/data
  #   networks:
  #     - yunt-internal
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U yunt -d yunt"]
  #     interval: 10s
  #     timeout: 5s
  #     start_period: 10s
  #     retries: 5
  #   deploy:
  #     resources:
  #       limits:
  #         memory: 512M
  #       reservations:
  #         memory: 128M

# =============================================================================
# Volumes
# =============================================================================
volumes:
  traefik-letsencrypt:
    name: traefik-letsencrypt
  yunt-data:
    name: yunt-data
  # postgres-data:
  #   name: yunt-postgres-data

# =============================================================================
# Networks
# =============================================================================
networks:
  # Public network for Traefik proxy
  yunt-proxy:
    name: yunt-proxy
    
  # Internal network for database connections
  yunt-internal:
    name: yunt-internal
    internal: true

# =============================================================================
# PostgreSQL Configuration
# =============================================================================
# To use PostgreSQL instead of SQLite:
#
# 1. Uncomment the postgres service above
# 2. Uncomment the postgres-data volume
# 3. Update the yunt service environment:
#
#     environment:
#       YUNT_DATABASE_DRIVER: postgres
#       YUNT_DATABASE_HOST: postgres
#       YUNT_DATABASE_PORT: "5432"
#       YUNT_DATABASE_NAME: yunt
#       YUNT_DATABASE_USERNAME: yunt
#       YUNT_DATABASE_PASSWORD: ${POSTGRES_PASSWORD}
#       YUNT_DATABASE_SSLMODE: disable
#       YUNT_DATABASE_AUTOMIGRATE: "true"
#
# 4. Add depends_on to yunt service:
#
#     depends_on:
#       postgres:
#         condition: service_healthy
#
# 5. Set POSTGRES_PASSWORD in your .env file
#
# =============================================================================

# =============================================================================
# High Availability Configuration
# =============================================================================
# For high availability with multiple Yunt instances:
#
# 1. Use PostgreSQL or MySQL (required for multiple instances)
# 2. Scale the yunt service:
#
#     docker-compose up -d --scale yunt=3
#
# 3. Or configure replicas in the service:
#
#     deploy:
#       replicas: 3
#
# Traefik will automatically load balance between instances.
#
# =============================================================================

# =============================================================================
# SMTP and IMAP Ports
# =============================================================================
# For direct SMTP/IMAP access (not through Traefik), add these port mappings
# to the yunt service:
#
#     ports:
#       - "25:1025"      # SMTP
#       - "587:1025"     # SMTP Submission
#       - "143:1143"     # IMAP
#       - "993:1143"     # IMAPS (requires TLS config in Yunt)
#
# Note: Using standard ports (25, 143) requires root privileges or
# appropriate capabilities.
#
# =============================================================================
