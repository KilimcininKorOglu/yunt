# =============================================================================
# Yunt Mail Server - Kubernetes Persistent Volume Claim
# =============================================================================
# This PVC provides persistent storage for Yunt's data, including:
# - SQLite database (when using default database driver)
# - Mail attachments
# - Other application data
#
# Storage Class: Uses the cluster's default storage class if not specified.
# Adjust the storageClassName based on your cluster's available storage classes.
# =============================================================================

apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yunt-data-pvc
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: mail-server
spec:
  accessModes:
    # ReadWriteOnce: Volume can be mounted as read-write by a single node
    # Use ReadWriteMany if you need multiple replicas with shared storage
    - ReadWriteOnce
  resources:
    requests:
      # Adjust storage size based on expected mail volume
      # 1Gi is suitable for development/testing
      # Consider 10Gi+ for production workloads
      storage: 1Gi
  # Uncomment and set to use a specific storage class
  # storageClassName: standard
  # storageClassName: gp2           # AWS EBS
  # storageClassName: managed-csi   # Azure Disk
  # storageClassName: standard-rwo  # GCP Persistent Disk

---
# Optional: Configuration storage for mounting custom config files
# Useful when you want to persist configuration separate from data
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: yunt-config-pvc
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: mail-server
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 100Mi
