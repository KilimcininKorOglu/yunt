# =============================================================================
# Yunt Mail Server - Kubernetes Ingress
# =============================================================================
# This Ingress exposes the Web UI and REST API via HTTP/HTTPS.
#
# Prerequisites:
# - Ingress Controller installed (nginx-ingress, traefik, etc.)
# - DNS configured to point to the Ingress controller's external IP
# - (Optional) cert-manager for automatic TLS certificates
#
# Supported Ingress Controllers:
# - NGINX Ingress Controller (kubernetes.github.io/ingress-nginx)
# - Traefik
# - HAProxy
# - AWS ALB Ingress Controller
# - GCE Ingress Controller
# =============================================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: yunt-ingress
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: ingress
  annotations:
    # NGINX Ingress Controller annotations
    kubernetes.io/ingress.class: "nginx"
    
    # Enable SSL redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    
    # Proxy settings
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    
    # Rate limiting (optional)
    # nginx.ingress.kubernetes.io/limit-rps: "10"
    
    # CORS settings (optional)
    # nginx.ingress.kubernetes.io/enable-cors: "true"
    # nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    
    # cert-manager annotations for automatic TLS
    # cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  # Ingress class name (use this instead of annotation in newer versions)
  ingressClassName: nginx
  
  # TLS configuration
  # Uncomment to enable HTTPS
  # tls:
  #   - hosts:
  #       - mail.example.com
  #     secretName: yunt-tls-secret
  
  rules:
    # Replace with your actual domain
    - host: mail.example.com
      http:
        paths:
          # Route all traffic to the HTTP service
          - path: /
            pathType: Prefix
            backend:
              service:
                name: yunt-http
                port:
                  number: 8025

