# =============================================================================
# Yunt Mail Server - Kubernetes Deployment
# =============================================================================
# This Deployment manages the Yunt mail server pods with:
# - Health checks (liveness, readiness, startup probes)
# - Resource limits and requests
# - Security contexts for non-root execution
# - Volume mounts for persistent data
# - Environment variables from ConfigMap and Secret
# =============================================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: yunt
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: mail-server
spec:
  # Single replica by default (SQLite requires single writer)
  # For PostgreSQL/MySQL, you can increase replicas
  replicas: 1
  
  # Update strategy
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  
  selector:
    matchLabels:
      app: yunt
  
  template:
    metadata:
      labels:
        app: yunt
        app.kubernetes.io/name: yunt
        app.kubernetes.io/component: mail-server
      annotations:
        # Prometheus metrics scraping (if enabled)
        prometheus.io/scrape: "true"
        prometheus.io/port: "8025"
        prometheus.io/path: "/metrics"
    spec:
      # Security context for the pod
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        runAsNonRoot: true
      
      # Service account (create if needed for RBAC)
      serviceAccountName: default
      
      # Graceful shutdown timeout
      terminationGracePeriodSeconds: 30
      
      containers:
        - name: yunt
          image: ghcr.io/yunt/yunt:latest
          imagePullPolicy: IfNotPresent
          
          # Container ports
          ports:
            - name: smtp
              containerPort: 1025
              protocol: TCP
            - name: imap
              containerPort: 1143
              protocol: TCP
            - name: http
              containerPort: 8025
              protocol: TCP
          
          # Environment variables from ConfigMap
          envFrom:
            - configMapRef:
                name: yunt-config
            - secretRef:
                name: yunt-secret
          
          # Resource limits and requests
          resources:
            requests:
              # Minimum resources for scheduling
              cpu: 100m
              memory: 128Mi
            limits:
              # Maximum resources allowed
              cpu: 500m
              memory: 512Mi
          
          # Startup probe: Checks if the application has started
          # Allows longer startup time before liveness checks begin
          startupProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30  # 30 * 5s = 150s max startup time
          
          # Liveness probe: Checks if the application is running
          # Restart container if this fails
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 0
            periodSeconds: 15
            timeoutSeconds: 5
            failureThreshold: 3
          
          # Readiness probe: Checks if the application is ready to serve traffic
          # Remove from service endpoints if this fails
          readinessProbe:
            httpGet:
              path: /ready
              port: http
            initialDelaySeconds: 0
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          
          # Volume mounts
          volumeMounts:
            - name: data
              mountPath: /var/lib/yunt
            # Uncomment to mount configuration file
            # - name: config-file
            #   mountPath: /etc/yunt
            #   readOnly: true
          
          # Container security context
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
            capabilities:
              drop:
                - ALL
      
      # Volumes
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: yunt-data-pvc
        # Uncomment to use configuration file from ConfigMap
        # - name: config-file
        #   configMap:
        #     name: yunt-config-file
        #     items:
        #       - key: yunt.yaml
        #         path: yunt.yaml
      
      # Node affinity and tolerations (optional)
      # affinity:
      #   nodeAffinity:
      #     requiredDuringSchedulingIgnoredDuringExecution:
      #       nodeSelectorTerms:
      #         - matchExpressions:
      #             - key: kubernetes.io/os
      #               operator: In
      #               values:
      #                 - linux
      
      # tolerations:
      #   - key: "key"
      #     operator: "Equal"
      #     value: "value"
      #     effect: "NoSchedule"
