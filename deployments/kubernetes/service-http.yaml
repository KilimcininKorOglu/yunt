# =============================================================================
# Yunt Mail Server - HTTP Service (Web UI / REST API)
# =============================================================================
# This Service exposes the Web UI and REST API for browser access.
#
# This is the primary service for:
# - Web-based admin panel
# - REST API endpoints
# - Health check endpoints (/health, /ready)
#
# Use with Ingress for:
# - TLS termination
# - Custom domain routing
# - Path-based routing
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: yunt-http
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: http
spec:
  type: ClusterIP
  selector:
    app: yunt
  ports:
    - name: http
      port: 8025
      targetPort: http
      protocol: TCP

---
