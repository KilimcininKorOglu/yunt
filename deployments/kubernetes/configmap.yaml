# =============================================================================
# Yunt Mail Server - Kubernetes ConfigMap
# =============================================================================
# This ConfigMap contains the non-sensitive configuration for Yunt.
# Sensitive values should be stored in the Secret resource.
# =============================================================================

apiVersion: v1
kind: ConfigMap
metadata:
  name: yunt-config
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: mail-server
data:
  # Server Settings
  YUNT_SERVER_NAME: "localhost"
  YUNT_SERVER_DOMAIN: "localhost"
  
  # Database Configuration
  YUNT_DATABASE_DRIVER: "sqlite"
  YUNT_DATABASE_DSN: "/var/lib/yunt/yunt.db"
  
  # Logging Configuration
  YUNT_LOGGING_LEVEL: "info"
  YUNT_LOGGING_FORMAT: "json"
  YUNT_LOGGING_OUTPUT: "stdout"
  
  # SMTP Configuration
  YUNT_SMTP_ENABLED: "true"
  YUNT_SMTP_HOST: "0.0.0.0"
  YUNT_SMTP_PORT: "1025"
  YUNT_SMTP_AUTHREQUIRED: "false"
  YUNT_SMTP_ALLOWRELAY: "false"
  
  # IMAP Configuration
  YUNT_IMAP_ENABLED: "true"
  YUNT_IMAP_HOST: "0.0.0.0"
  YUNT_IMAP_PORT: "1143"
  
  # API Configuration
  YUNT_API_ENABLED: "true"
  YUNT_API_HOST: "0.0.0.0"
  YUNT_API_PORT: "8025"
  YUNT_API_RATELIMIT: "100"
  
  # Admin User Settings
  YUNT_ADMIN_USERNAME: "admin"
  YUNT_ADMIN_EMAIL: "admin@localhost"

---
# Optional: Full configuration file as ConfigMap
# Mount this to /etc/yunt/yunt.yaml if you prefer file-based configuration
apiVersion: v1
kind: ConfigMap
metadata:
  name: yunt-config-file
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: mail-server
data:
  yunt.yaml: |
    # Yunt Mail Server Configuration
    server:
      name: localhost
      domain: localhost
      gracefulTimeout: 30s

    smtp:
      enabled: true
      host: 0.0.0.0
      port: 1025
      maxMessageSize: 10485760
      maxRecipients: 100
      readTimeout: 60s
      writeTimeout: 60s
      authRequired: false
      allowRelay: false

    imap:
      enabled: true
      host: 0.0.0.0
      port: 1143
      readTimeout: 60s
      writeTimeout: 60s
      idleTimeout: 30m

    api:
      enabled: true
      host: 0.0.0.0
      port: 8025
      readTimeout: 30s
      writeTimeout: 30s
      corsAllowedOrigins:
        - "*"
      rateLimit: 100
      enableSwagger: true

    database:
      driver: sqlite
      dsn: /var/lib/yunt/yunt.db
      maxOpenConns: 25
      maxIdleConns: 5
      connMaxLifetime: 5m
      autoMigrate: true

    logging:
      level: info
      format: json
      output: stdout
      includeCaller: false

    admin:
      username: admin
      email: admin@localhost
      createOnStartup: true

    storage:
      type: database
      maxMailboxSize: 0
      retentionDays: 0
