# =============================================================================
# Yunt Mail Server - IMAP Service
# =============================================================================
# This Service exposes the IMAP server for mail client access.
#
# Service Type Options:
# - ClusterIP (default): Internal access only
# - NodePort: Expose on a static port on each node
# - LoadBalancer: Cloud provider load balancer (AWS ELB, GCP LB, etc.)
#
# For production IMAP, consider:
# - Using port 143 (plain/STARTTLS) or 993 (implicit TLS)
# - Setting up external load balancer with static IP
# - Configuring TLS termination at the application level
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: yunt-imap
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: imap
spec:
  type: ClusterIP
  selector:
    app: yunt
  ports:
    - name: imap
      port: 1143
      targetPort: imap
      protocol: TCP

---
