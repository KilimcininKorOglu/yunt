# =============================================================================
# Yunt Mail Server - Kubernetes Secret
# =============================================================================
# This Secret contains sensitive configuration for Yunt.
#
# IMPORTANT: In production, use external secret management solutions such as:
# - Kubernetes External Secrets
# - HashiCorp Vault with CSI driver
# - AWS Secrets Manager
# - Azure Key Vault
#
# The values below are base64 encoded placeholders. Replace them before deployment.
#
# To encode a value: echo -n 'your-value' | base64
# To decode a value: echo 'encoded-value' | base64 -d
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: yunt-secret
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: mail-server
type: Opaque
stringData:
  # JWT Secret for token signing
  # Generate with: openssl rand -hex 32
  # REQUIRED: Change this in production!
  YUNT_AUTH_JWTSECRET: "change-me-to-a-secure-random-string-minimum-32-chars"
  
  # Admin password
  # REQUIRED: Change this in production!
  YUNT_ADMIN_PASSWORD: "change-me-to-a-secure-password"

---
# Optional: Database credentials for PostgreSQL/MySQL deployments
# Uncomment and configure if using an external database
