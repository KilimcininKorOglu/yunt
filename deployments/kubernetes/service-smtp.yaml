# =============================================================================
# Yunt Mail Server - SMTP Service
# =============================================================================
# This Service exposes the SMTP server for receiving emails.
#
# Service Type Options:
# - ClusterIP (default): Internal access only
# - NodePort: Expose on a static port on each node
# - LoadBalancer: Cloud provider load balancer (AWS ELB, GCP LB, etc.)
#
# For production SMTP, consider:
# - Using port 25 for inbound mail (requires privileged access)
# - Using port 465 (implicit TLS) or 587 (submission/STARTTLS)
# - Setting up external load balancer with static IP
# =============================================================================

apiVersion: v1
kind: Service
metadata:
  name: yunt-smtp
  labels:
    app: yunt
    app.kubernetes.io/name: yunt
    app.kubernetes.io/component: smtp
spec:
  type: ClusterIP
  selector:
    app: yunt
  ports:
    - name: smtp
      port: 1025
      targetPort: smtp
      protocol: TCP

