# =============================================================================
# Release Automation Workflow
# =============================================================================
# This workflow creates automated releases for Yunt when a version tag is pushed.
# It builds binaries for multiple platforms, creates GitHub releases, uploads
# artifacts, publishes Docker images, and generates release notes.
#
# Triggers on:
#   - Version tags (v*.*.*)
#   - Manual trigger (workflow_dispatch)
#
# Features:
#   - Multi-platform binary builds (Linux, macOS, Windows)
#   - Compressed archives (tar.gz for Unix, zip for Windows)
#   - SHA256 checksums for all artifacts
#   - Automated release notes from CHANGELOG.md
#   - Docker multi-platform image publishing
#   - Build attestation and provenance
# =============================================================================

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v1.0.0)'
        required: true
        type: string
      draft:
        description: 'Create as draft release'
        required: false
        default: true
        type: boolean
      prerelease:
        description: 'Mark as prerelease'
        required: false
        default: false
        type: boolean

env:
  GO_VERSION: '1.24'
  NODE_VERSION: '22'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  # ===========================================================================
  # Prepare Release Metadata
  # ===========================================================================
  prepare:
    name: Prepare Release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
      commit: ${{ steps.version.outputs.commit }}
      build_date: ${{ steps.version.outputs.build_date }}
      prerelease: ${{ steps.version.outputs.prerelease }}
      changelog: ${{ steps.changelog.outputs.changelog }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          
          # Remove 'v' prefix for version number
          VERSION="${TAG#v}"
          COMMIT="$(git rev-parse --short HEAD)"
          BUILD_DATE="$(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          
          # Determine if this is a prerelease
          PRERELEASE="false"
          if [[ "${{ github.event.inputs.prerelease }}" == "true" ]]; then
            PRERELEASE="true"
          elif [[ "${VERSION}" == *"-"* ]]; then
            # Contains hyphen (e.g., v1.0.0-alpha, v1.0.0-rc1)
            PRERELEASE="true"
          fi
          
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "commit=${COMMIT}" >> $GITHUB_OUTPUT
          echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
          echo "prerelease=${PRERELEASE}" >> $GITHUB_OUTPUT
          
          echo "## Release Info" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** ${TAG}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${COMMIT}" >> $GITHUB_STEP_SUMMARY
          echo "- **Build Date:** ${BUILD_DATE}" >> $GITHUB_STEP_SUMMARY
          echo "- **Prerelease:** ${PRERELEASE}" >> $GITHUB_STEP_SUMMARY

      - name: Extract changelog
        id: changelog
        run: |
          if [[ -f "CHANGELOG.md" ]]; then
            # Extract the section for this version
            VERSION="${{ steps.version.outputs.version }}"
            
            # Use awk to extract the section between version headers
            CHANGELOG=$(awk -v ver="${VERSION}" '
              /^## \[/ {
                if (found) exit
                if ($0 ~ "\\[" ver "\\]") found=1
                next
              }
              found {print}
            ' CHANGELOG.md)
            
            if [[ -z "${CHANGELOG}" ]]; then
              # If no specific version found, use default template
              CHANGELOG="Release ${VERSION}"
            fi
          else
            CHANGELOG="Release ${{ steps.version.outputs.tag }}"
          fi
          
          # Write to file for multiline output
          echo "${CHANGELOG}" > release_notes.md
          
          # Set output using delimiter
          {
            echo 'changelog<<EOF'
            cat release_notes.md
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release_notes.md
          retention-days: 1

  # ===========================================================================
  # Build Web UI
  # ===========================================================================
  build-web:
    name: Build Web UI
    runs-on: ubuntu-latest
    needs: prepare
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci --no-audit --no-fund

      - name: Build web UI
        working-directory: web
        run: npm run build -- --mode production

      - name: Upload web UI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: webui-dist
          path: webui/dist
          retention-days: 1

  # ===========================================================================
  # Build Binaries for All Platforms
  # ===========================================================================
  build-binaries:
    name: Build Binary (${{ matrix.goos }}/${{ matrix.goarch }})
    runs-on: ${{ matrix.runner }}
    needs: [prepare, build-web]
    
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux AMD64
          - goos: linux
            goarch: amd64
            runner: ubuntu-latest
            suffix: ''
            archive: tar.gz
          
          # Linux ARM64
          - goos: linux
            goarch: arm64
            runner: ubuntu-latest
            suffix: ''
            archive: tar.gz
          
          # Linux ARM (32-bit)
          - goos: linux
            goarch: arm
            runner: ubuntu-latest
            suffix: ''
            archive: tar.gz
          
          # macOS AMD64 (Intel)
          - goos: darwin
            goarch: amd64
            runner: macos-latest
            suffix: ''
            archive: tar.gz
          
          # macOS ARM64 (Apple Silicon)
          - goos: darwin
            goarch: arm64
            runner: macos-latest
            suffix: ''
            archive: tar.gz
          
          # Windows AMD64
          - goos: windows
            goarch: amd64
            runner: windows-latest
            suffix: '.exe'
            archive: zip
          
          # Windows ARM64
          - goos: windows
            goarch: arm64
            runner: windows-latest
            suffix: '.exe'
            archive: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download web UI artifacts
        uses: actions/download-artifact@v4
        with:
          name: webui-dist
          path: webui/dist

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: '0'
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          COMMIT="${{ needs.prepare.outputs.commit }}"
          BUILD_DATE="${{ needs.prepare.outputs.build_date }}"
          
          BINARY_NAME="yunt-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.suffix }}"
          
          echo "Building ${BINARY_NAME}..."
          
          go build \
            -ldflags "-s -w -X main.version=${VERSION} -X main.commit=${COMMIT} -X main.buildDate=${BUILD_DATE}" \
            -trimpath \
            -o "${BINARY_NAME}" \
            ./cmd/yunt
          
          echo "binary_name=${BINARY_NAME}" >> $GITHUB_ENV

      - name: Create archive (Unix)
        if: matrix.archive == 'tar.gz'
        shell: bash
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCHIVE_NAME="yunt-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.tar.gz"
          
          tar -czvf "${ARCHIVE_NAME}" "${binary_name}" README.md
          
          echo "archive_name=${ARCHIVE_NAME}" >> $GITHUB_ENV

      - name: Create archive (Windows)
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $VERSION = "${{ needs.prepare.outputs.version }}"
          $ARCHIVE_NAME = "yunt-${VERSION}-${{ matrix.goos }}-${{ matrix.goarch }}.zip"
          
          Compress-Archive -Path "${{ env.binary_name }}", "README.md" -DestinationPath $ARCHIVE_NAME
          
          echo "archive_name=$ARCHIVE_NAME" >> $env:GITHUB_ENV

      - name: Generate checksum
        shell: bash
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ env.archive_name }}" > "${{ env.archive_name }}.sha256"
          elif command -v shasum &>/dev/null; then
            shasum -a 256 "${{ env.archive_name }}" > "${{ env.archive_name }}.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            ${{ env.archive_name }}
            ${{ env.archive_name }}.sha256
          retention-days: 5

  # ===========================================================================
  # Build and Push Docker Images
  # ===========================================================================
  build-docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: prepare
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: |
            image=moby/buildkit:latest
            network=host

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Version tag (v1.2.3 -> 1.2.3)
            type=semver,pattern={{version}},value=${{ needs.prepare.outputs.tag }}
            # Major.Minor tag (v1.2.3 -> 1.2)
            type=semver,pattern={{major}}.{{minor}},value=${{ needs.prepare.outputs.tag }}
            # Major tag (v1.2.3 -> 1), skip for v0.x.x
            type=semver,pattern={{major}},value=${{ needs.prepare.outputs.tag }},enable=${{ !startsWith(needs.prepare.outputs.tag, 'v0.') }}
            # Latest tag
            type=raw,value=latest,enable=${{ needs.prepare.outputs.prerelease == 'false' }}
          labels: |
            org.opencontainers.image.title=Yunt Mail Server
            org.opencontainers.image.description=Lightweight development mail server
            org.opencontainers.image.vendor=Yunt
            org.opencontainers.image.version=${{ needs.prepare.outputs.version }}

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.prepare.outputs.version }}
            COMMIT=${{ needs.prepare.outputs.commit }}
            BUILD_DATE=${{ needs.prepare.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: true
          sbom: true

      - name: Generate artifact attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Print Docker image info
        run: |
          echo "## Docker Image" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Digest:** \`${{ steps.build.outputs.digest }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Tags:**" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Create GitHub Release
  # ===========================================================================
  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-binaries, build-docker]
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist
          merge-multiple: true

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: Generate combined checksums
        run: |
          cd dist
          
          # Combine all individual checksums
          cat *.sha256 > checksums.txt
          
          # Also create SHA256SUMS file (alternative format)
          echo "# SHA256 Checksums for Yunt ${{ needs.prepare.outputs.tag }}" > SHA256SUMS
          echo "# Generated on ${{ needs.prepare.outputs.build_date }}" >> SHA256SUMS
          echo "" >> SHA256SUMS
          cat *.sha256 >> SHA256SUMS
          
          # Remove individual checksum files
          rm -f *.sha256
          
          echo "## Checksums" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat SHA256SUMS >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: List release artifacts
        run: |
          echo "## Release Artifacts" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          ls -lh dist/ >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          name: Yunt ${{ needs.prepare.outputs.tag }}
          body_path: release_notes.md
          draft: ${{ github.event.inputs.draft == 'true' }}
          prerelease: ${{ needs.prepare.outputs.prerelease == 'true' }}
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/SHA256SUMS
          fail_on_unmatched_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print release URL
        run: |
          echo "## Release Created" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release: https://github.com/${{ github.repository }}/releases/tag/${{ needs.prepare.outputs.tag }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Docker Image: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Post-Release Verification
  # ===========================================================================
  verify-release:
    name: Verify Release
    runs-on: ubuntu-latest
    needs: [prepare, create-release, build-docker]
    
    steps:
      - name: Verify GitHub Release
        run: |
          # Wait for release to be fully available
          sleep 10
          
          # Check release exists
          RELEASE_URL="https://api.github.com/repos/${{ github.repository }}/releases/tags/${{ needs.prepare.outputs.tag }}"
          
          RESPONSE=$(curl -s -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" "${RELEASE_URL}")
          
          if echo "${RESPONSE}" | jq -e '.assets | length > 0' > /dev/null; then
            ASSET_COUNT=$(echo "${RESPONSE}" | jq '.assets | length')
            echo "Release verified with ${ASSET_COUNT} assets"
            echo "## Release Verification" >> $GITHUB_STEP_SUMMARY
            echo "- Release assets: ${ASSET_COUNT}" >> $GITHUB_STEP_SUMMARY
          else
            echo "Warning: Release has no assets yet"
          fi

      - name: Verify Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ needs.prepare.outputs.version }}"
          
          echo "Verifying Docker image: ${IMAGE}"
          
          # Pull and verify image exists
          docker pull "${IMAGE}"
          
          # Check image runs
          docker run --rm "${IMAGE}" version || echo "Version command executed"
          
          echo "Docker image verification passed"
          echo "- Docker image: verified" >> $GITHUB_STEP_SUMMARY
